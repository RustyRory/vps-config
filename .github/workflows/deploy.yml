name: Deploy VPS Config

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Update VPS Config
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Mettre à jour la config
            cd /var/www/vps-config
            git pull origin main

            # Mettre à jour Nginx si modifié
            sudo cp nginx/vps /etc/nginx/sites-enabled/vps
            sudo cp nginx/vps /etc/nginx/sites-available/vps
            sudo nginx -t && sudo systemctl reload nginx

            # Mettre à jour docker-compose si modifié
            cd /var/www
            docker compose up -d --remove-orphans

            echo "✅ Config déployée!"